<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/base-layout}">
<div layout:fragment="content">
    <h2>좋아요 곡 목록</h2>

    <div id="liked-song-container">
        <div th:if="${likedSongs == null || #lists.isEmpty(likedSongs.items)}" style="text-align: center; margin-top: 50px; color: #999;">
            <p>좋아요 표시한 곡이 없습니다.</p>
        </div>

        <div th:each="song : ${likedSongs.items}" class="record" th:data-song-id="${song.songId}">
            <div class="record-left">
                <img th:src="${(song.image == null || song.image == 'null' || song.image == '') 
                                ? '/images/basicProfileCat.png' : song.image}" alt="앨범 커버" class="album-cover" />

                <div class="song-info">
                    <div class="song-title" th:text="${song.title}">노래 제목</div>
                    <div class="song-uploader" th:text="${song.uploader}">가수 이름</div>
                </div>
            </div>

            <button class="like-btn liked" th:data-song-id="${song.songId}"
                onclick="toggleLike(this); removeRecordIfUnliked(this);">
            </button>
        </div>
    </div>
</div>

<th:block layout:fragment="script">
    <script src="/js/likedSongs.js"></script>
</th:block>

</html>
